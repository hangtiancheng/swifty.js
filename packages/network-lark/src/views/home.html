<div class="bg-base-100 text-base-content flex min-h-screen flex-col items-center p-8">
  <div class="w-full max-w-4xl">
    <div class="mb-8 flex items-center justify-between">
      <h1 class="text-primary text-3xl">{{=title}}</h1>
      <div class="dropdown dropdown-end">
        <div tabindex="0" role="button" class="btn m-1">{{=langLabel}}</div>
        <ul tabindex="0" class="dropdown-content menu bg-base-100 rounded-box z-1 w-30 p-2 shadow">
          <li>
            <button @click="onChangeLangZh()" class="{{if lang === 'zh'}}active{{/if}}">
              中文
            </button>
          </li>
          <li>
            <button @click="onChangeLangEn()" class="{{if lang === 'en'}}active{{/if}}">
              English
            </button>
          </li>
        </ul>
      </div>
    </div>
    <div v-lark="components/diagnose-panel"></div>
  </div>
</div>
