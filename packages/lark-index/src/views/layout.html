<!--
  Top-level layout: a single header strip + three equal columns (1:1:1).

  The grid template uses CSS Grid with explicit fr units so the ratio is
  preserved across all viewport widths without media queries. Each column
  is a Lark sub-view embedded via v-lark; their containers are styled
  here so the children only need to render their own internals.

  Columns:
    left   – Personal bookmarks  (virtual scroll)
    center – Work bookmarks      (virtual scroll)
    right  – Read List bookmarks (virtual scroll)
-->
<div
  class="flex h-screen w-screen flex-col overflow-hidden bg-emerald-50/40 antialiased"
>
  <header
    class="flex items-center justify-between border-b border-emerald-100 bg-white/70 px-5 py-2.5 backdrop-blur"
  >
    <div class="flex items-center gap-3">
      <div
        class="flex h-7 w-7 items-center justify-center rounded-md bg-emerald-600 text-xs font-semibold text-white shadow-sm"
      >
        L
      </div>
      <div class="leading-tight">
        <div class="text-sm font-semibold tracking-tight text-emerald-900">
          Lark Index
        </div>
        <div class="text-[10px] text-emerald-700/60">
          {{=greeting}} · {{=todayLabel}}
        </div>
      </div>
    </div>
    <div class="text-right leading-tight">
      <div
        class="font-mono text-lg font-semibold tracking-tight text-emerald-900"
      >
        {{=clock}}
      </div>
      <div class="text-[10px] text-emerald-700/60">{{=weekday}}</div>
    </div>
  </header>

  <main
    class="grid min-h-0 flex-1 gap-3 p-3"
    style="grid-template-columns: 1fr 1fr 1fr"
  >
    <section
      class="flex min-h-0 flex-col overflow-hidden rounded-xl border border-emerald-100 bg-white shadow-sm"
      v-lark="views/personal-bookmarks"
    ></section>
    <section
      class="flex min-h-0 flex-col overflow-hidden rounded-xl border border-emerald-100 bg-white shadow-sm"
      v-lark="views/work-bookmarks"
    ></section>
    <section
      class="flex min-h-0 flex-col overflow-hidden rounded-xl border border-emerald-100 bg-white shadow-sm"
      v-lark="views/read-list-bookmarks"
    ></section>
  </main>
</div>
