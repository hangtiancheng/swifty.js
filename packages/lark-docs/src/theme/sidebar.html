<nav>
  {{forOf sidebarGroups as group}}
  <div class="mb-4">
    {{if group.text}}
    <p
      class="text-base-content/70 mb-2 text-sm font-semibold tracking-wider uppercase"
    >
      {{=group.text}}
    </p>
    {{/if}}
    <ul class="menu menu-sm p-0">
      {{forOf group.items as item}}
      <li>
        <a
          class="{{if item.isActive}}menu-active font-medium{{/if}}"
          data-href="{{=item.link}}"
          @click="navigateTo()"
        >
          {{=item.text}}
        </a>
      </li>
      {{/forOf}}
    </ul>
  </div>
  {{/forOf}}
</nav>
