<div>
  <p
    class="text-base-content/70 mb-2 text-sm font-semibold tracking-wider uppercase"
  >
    On this page
  </p>
  {{if headings.length > 0}}
  <ul class="menu menu-sm p-0">
    {{forOf headings as heading}}
    <li class="{{if heading.level === 3}}ml-4{{/if}}">
      <a
        class="{{if heading.isActive}}menu-active text-primary font-medium{{/if}}"
        href="#{{=heading.slug}}"
        @click="scrollToHeading({slug: '{{=heading.slug}}'})"
      >
        {{=heading.text}}
      </a>
    </li>
    {{/forOf}}
  </ul>
  {{else}}
  <p class="text-base-content/40 text-sm">No headings</p>
  {{/if}}
</div>
