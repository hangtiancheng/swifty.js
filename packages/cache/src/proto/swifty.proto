syntax = "proto3";
package pb;

message Request {
  string group = 1;
  string key = 2;
  bytes value = 3;
}

message ResponseForGet {
  bytes value = 1;
}

message ResponseForSet {
  bool success = 1;
}

message ResponseForDelete {
  bool value = 1;
}

service SwiftyCache {
  rpc Get(Request) returns (ResponseForGet);
  rpc Set(Request) returns (ResponseForSet);
  rpc Delete(Request) returns (ResponseForDelete);
}
