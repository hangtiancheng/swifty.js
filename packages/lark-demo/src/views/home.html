<!-- Home View Template -->
<div class="min-h-screen bg-emerald-50/30 p-6">
  <div class="mx-auto max-w-3xl">
    <h1 class="mb-2 text-2xl font-normal tracking-tight text-emerald-800">
      {{=title}}
    </h1>
    <p class="mb-6 text-xs text-emerald-500">{{=description}}</p>

    <div class="mb-6 rounded-lg border border-emerald-100 bg-white p-5">
      <h2 class="mb-3 text-base font-normal text-emerald-700">Navigation</h2>
      <div class="flex gap-3">
        <button
          @click="navigateTo({path: '/about'})"
          class="rounded-md bg-emerald-500 px-5 py-2 text-xs font-normal text-white transition-colors hover:bg-emerald-600"
        >
          About
        </button>
        <button
          @click="navigateTo({path: '/counter'})"
          class="rounded-md bg-sky-500 px-5 py-2 text-xs font-normal text-white transition-colors hover:bg-sky-600"
        >
          Counter
        </button>
      </div>
    </div>

    <div class="mb-6 rounded-lg border border-emerald-100 bg-white p-5">
      <div class="mb-3 flex items-center justify-between">
        <h2 class="text-base font-normal text-emerald-700">Store State</h2>
        <a
          @click="navigateTo({path: '/counter'})"
          class="cursor-pointer text-xs text-emerald-400 underline decoration-emerald-200 underline-offset-2 transition-colors hover:text-emerald-600"
        >
          modify
        </a>
      </div>
      <div class="flex items-center gap-4">
        <div
          class="flex-1 rounded-md bg-emerald-500 py-6 text-center text-white"
        >
          <div class="text-3xl font-normal tracking-tight">{{=count}}</div>
          <div class="text-[10px] opacity-60">count</div>
        </div>
        <div class="flex-1 rounded-md bg-sky-500 py-6 text-center text-white">
          <div class="text-3xl font-normal tracking-tight">{{=step}}</div>
          <div class="text-[10px] opacity-60">step</div>
        </div>
      </div>
    </div>

    <div class="mb-6 rounded-lg border border-emerald-100 bg-white p-5">
      <h2 class="mb-3 text-base font-normal text-emerald-700">Interaction</h2>
      <button
        @click="showInfo({title: 'Notice', message: 'You clicked the button!'})"
        class="rounded-md bg-emerald-500 px-5 py-2 text-xs font-normal text-white transition-colors hover:bg-emerald-600"
      >
        Show Alert
      </button>
    </div>

    <div class="rounded-lg border border-emerald-100 bg-emerald-50/50 p-4">
      <p class="mb-1 text-xs font-normal text-emerald-700">App: {{=appName}}</p>
      <p class="text-xs text-emerald-500">Time: {{=currentTime}}</p>
    </div>
  </div>
</div>
