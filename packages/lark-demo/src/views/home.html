<!-- Home View Template -->
<div class="min-h-screen bg-white">
  <!-- Hero -->
  <div class="px-6 pt-20 pb-14">
    <div class="mx-auto max-w-2xl text-center">
      <div
        class="mb-6 inline-flex items-center rounded-full border border-neutral-200 bg-neutral-50 px-4 py-1.5 text-xs text-neutral-500"
      >
        {{=description}}
      </div>
      <h1
        class="mb-6 text-5xl leading-tight font-semibold tracking-tight text-neutral-900"
      >
        {{=title}}
      </h1>
      <div class="flex items-center justify-center gap-3">
        <button
          @click="navigateTo({path: '/about'})"
          class="inline-flex h-9 cursor-pointer items-center justify-center rounded-full bg-neutral-900 px-6 text-xs font-medium text-white transition-colors duration-150 hover:bg-neutral-700 active:bg-neutral-800"
        >
          Learn More
        </button>
        <button
          @click="navigateTo({path: '/counter'})"
          class="inline-flex h-9 cursor-pointer items-center justify-center rounded-full border border-neutral-300 bg-white px-6 text-xs font-medium text-neutral-700 transition-colors duration-150 hover:border-neutral-400 hover:bg-neutral-50 active:bg-neutral-100"
        >
          Live Demo
        </button>
      </div>
    </div>
  </div>

  <!-- Live State -->
  <div class="px-6 pb-14">
    <div class="mx-auto max-w-3xl">
      <div class="rounded-xl border border-neutral-200 bg-white p-6">
        <div class="mb-5 flex items-center justify-between">
          <h2 class="text-sm font-medium text-neutral-900">Live State</h2>
          <button
            @click="navigateTo({path: '/counter'})"
            class="inline-flex cursor-pointer items-center justify-center rounded-full px-3 py-1 text-xs text-neutral-400 transition-colors hover:text-neutral-900"
          >
            Open Counter
          </button>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div class="rounded-lg bg-neutral-950 py-6 text-center text-white">
            <div class="text-3xl font-semibold tabular-nums">{{=count}}</div>
            <div
              class="mt-1 text-[10px] tracking-widest text-neutral-500 uppercase"
            >
              count
            </div>
          </div>
          <div
            class="rounded-lg bg-neutral-100 py-6 text-center text-neutral-900"
          >
            <div class="text-3xl font-semibold tabular-nums">{{=step}}</div>
            <div
              class="mt-1 text-[10px] tracking-widest text-neutral-400 uppercase"
            >
              step
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Interaction -->
  <div class="px-6 pb-14">
    <div class="mx-auto max-w-3xl">
      <div class="rounded-xl border border-neutral-200 bg-white p-6">
        <h2 class="mb-4 text-sm font-medium text-neutral-900">Interaction</h2>
        <button
          @click="showInfo({title: 'Notice', message: 'You clicked the button!'})"
          class="inline-flex h-9 cursor-pointer items-center justify-center rounded-full bg-neutral-900 px-5 text-xs font-medium text-white transition-colors duration-150 hover:bg-neutral-700 active:bg-neutral-800"
        >
          Show Alert
        </button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="px-6 pb-8">
    <div class="mx-auto max-w-3xl">
      <div class="border-t border-neutral-100 pt-6">
        <div
          class="flex flex-wrap items-center justify-center gap-x-6 gap-y-1 text-[11px] text-neutral-400"
        >
          <span>{{=appName}}</span>
          <span class="h-3 w-px bg-neutral-200"></span>
          <span>{{=currentTime}}</span>
          <span class="h-3 w-px bg-neutral-200"></span>
          <span>Built with @lark.js/mvc</span>
        </div>
      </div>
    </div>
  </div>
</div>
