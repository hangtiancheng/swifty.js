<!-- About View Template -->
<div class="min-h-screen bg-white">
  <!-- Header -->
  <div class="px-6 pt-16 pb-8">
    <div class="mx-auto max-w-2xl">
      <button
        @click="goHome()"
        class="mb-8 inline-flex cursor-pointer items-center justify-center rounded-full px-3 py-1 text-xs text-neutral-400 transition-colors hover:text-neutral-900"
      >
        Back
      </button>
      <h1 class="text-4xl font-semibold tracking-tight text-neutral-900">
        {{=title}}
      </h1>
    </div>
  </div>

  <div class="px-6 pb-14">
    <div class="mx-auto max-w-2xl space-y-4">
      <!-- Shared Store State -->
      <div
        class="rounded-xl border border-neutral-200 bg-white p-6 transition-shadow duration-200 hover:shadow-sm"
      >
        <h3
          class="mb-4 text-[11px] font-medium tracking-widest text-neutral-400 uppercase"
        >
          Shared Store State
        </h3>
        <div class="grid grid-cols-2 gap-3">
          <div class="rounded-lg bg-neutral-950 py-5 text-center text-white">
            <div class="text-2xl font-semibold tabular-nums">{{=count}}</div>
            <div
              class="mt-1 text-[10px] tracking-widest text-neutral-500 uppercase"
            >
              count
            </div>
          </div>
          <div
            class="rounded-lg bg-neutral-100 py-5 text-center text-neutral-900"
          >
            <div class="text-2xl font-semibold tabular-nums">{{=step}}</div>
            <div
              class="mt-1 text-[10px] tracking-widest text-neutral-400 uppercase"
            >
              step
            </div>
          </div>
        </div>
      </div>

      <!-- About -->
      <div
        class="rounded-xl border border-neutral-200 bg-white p-6 transition-shadow duration-200 hover:shadow-sm"
      >
        <p class="text-sm leading-relaxed text-neutral-600">{{=content}}</p>
      </div>

      <!-- Version Information -->
      <div
        class="rounded-xl border border-neutral-200 bg-white p-6 transition-shadow duration-200 hover:shadow-sm"
      >
        <h3
          class="mb-4 text-[11px] font-medium tracking-widest text-neutral-400 uppercase"
        >
          Version Information
        </h3>
        <div class="space-y-2.5">
          <div class="flex items-center justify-between text-sm">
            <span class="text-neutral-500">Author</span>
            <span class="font-medium text-neutral-900">{{=author}}</span>
          </div>
          <div class="h-px bg-neutral-100"></div>
          <div class="flex items-center justify-between text-sm">
            <span class="text-neutral-500">Version</span>
            <span class="font-medium text-neutral-900">{{=version}}</span>
          </div>
        </div>
      </div>

      <!-- Route Parameter Demo -->
      <div
        class="rounded-xl border border-neutral-200 bg-white p-6 transition-shadow duration-200 hover:shadow-sm"
      >
        <h3
          class="mb-4 text-[11px] font-medium tracking-widest text-neutral-400 uppercase"
        >
          Route Parameters
        </h3>
        <div
          class="rounded-lg border border-neutral-100 bg-neutral-50 p-3 font-mono text-xs text-neutral-600"
        >
          author={{=author}}, version={{=version}}
        </div>
        <p class="mt-3 text-[11px] text-neutral-400">
          Tip: Visit #!/about?author=JohnDoe&version=1.0 to pass parameters
        </p>
      </div>
    </div>
  </div>
</div>
