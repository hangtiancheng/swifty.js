<!-- Counter Component (defineStore version) -->
<div class="rounded-lg border border-emerald-100 bg-white p-6">
  <div
    class="mb-3 text-[10px] font-normal tracking-widest text-emerald-400 uppercase"
  >
    defineStore
  </div>
  <div class="mb-5 rounded-md bg-emerald-500 py-6 text-center text-white">
    <div class="text-4xl font-normal tracking-tight">{{=count}}</div>
    <div class="text-[10px] opacity-60">current count</div>
  </div>

  <div class="mb-4 flex items-center gap-2">
    <label class="text-xs font-normal text-emerald-600">Step</label>
    <input
      type="number"
      value="{{=step}}"
      @change="stepChange()"
      min="1"
      max="100"
      class="w-14 rounded-md border border-emerald-200 bg-emerald-50/40 px-2 py-1 text-xs text-emerald-700 transition-colors outline-none focus:border-emerald-400"
    />
  </div>

  <div class="mb-4 flex justify-center gap-3">
    <button
      @click="decrement()"
      class="rounded-md bg-emerald-500 px-5 py-2 text-xs font-normal text-white transition-colors hover:bg-emerald-600"
    >
      - {{=step}}
    </button>
    <button
      @click="reset()"
      class="rounded-md border border-emerald-200 bg-white px-5 py-2 text-xs font-normal text-emerald-500 transition-colors hover:bg-emerald-50"
    >
      Reset
    </button>
    <button
      @click="increment()"
      class="rounded-md bg-emerald-500 px-5 py-2 text-xs font-normal text-white transition-colors hover:bg-emerald-600"
    >
      + {{=step}}
    </button>
  </div>

  <div class="flex items-center justify-between">
    <span
      class="text-[10px] font-normal tracking-widest text-emerald-400 uppercase"
      >History</span
    >
    <button
      @click="clearHistory()"
      class="rounded border border-emerald-200 px-2.5 py-1 text-[10px] text-emerald-500 transition-colors hover:bg-emerald-50"
    >
      Clear
    </button>
  </div>
  {{if history.length > 0}}
  <ul class="mt-3 max-h-56 space-y-2 overflow-y-auto">
    {{forOf history as record}}
    <li
      class="rounded border border-emerald-100 bg-emerald-50/40 px-3 py-2 font-mono text-[10px] text-emerald-600"
    >
      {{=record}}
    </li>
    {{/forOf}}
  </ul>
  {{else}}
  <p class="mt-3 text-center text-[10px] text-emerald-300">No history</p>
  {{/if}}
</div>
