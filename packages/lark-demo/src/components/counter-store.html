<!-- Counter Component (create version) -->
<div
  class="rounded-xl border border-neutral-200 bg-white p-5 transition-shadow duration-200 hover:shadow-sm"
>
  <div
    class="mb-4 text-[10px] font-medium tracking-widest text-neutral-400 uppercase"
  >
    create
  </div>

  <div class="mb-5 rounded-lg bg-neutral-950 py-6 text-center text-white">
    <div class="text-4xl font-semibold tabular-nums">{{=count}}</div>
    <div class="mt-1 text-[10px] tracking-widest text-neutral-500 uppercase">
      current count
    </div>
  </div>

  <div class="mb-4 flex items-center gap-2">
    <label class="text-xs text-neutral-500">Step</label>
    <input
      type="number"
      value="{{=step}}"
      @change="stepChange()"
      min="1"
      max="100"
      class="h-8 w-16 rounded-lg border border-neutral-300 bg-white px-2 text-xs text-neutral-900 transition-colors outline-none focus:border-neutral-500 focus:ring-1 focus:ring-neutral-500/20"
    />
  </div>

  <div class="mb-4 flex justify-center gap-2">
    <button
      @click="decrement()"
      class="inline-flex h-8 cursor-pointer items-center justify-center rounded-lg border border-neutral-300 bg-white px-4 text-xs font-medium text-neutral-700 transition-colors hover:bg-neutral-50 active:bg-neutral-100"
    >
      - {{=step}}
    </button>
    <button
      @click="reset()"
      class="inline-flex h-8 cursor-pointer items-center justify-center rounded-lg px-4 text-xs font-medium text-neutral-500 transition-colors hover:bg-neutral-100 active:bg-neutral-200"
    >
      Reset
    </button>
    <button
      @click="increment()"
      class="inline-flex h-8 cursor-pointer items-center justify-center rounded-lg bg-neutral-900 px-4 text-xs font-medium text-white transition-colors hover:bg-neutral-700 active:bg-neutral-800"
    >
      + {{=step}}
    </button>
  </div>

  <div class="flex items-center justify-between">
    <span
      class="text-[10px] font-medium tracking-widest text-neutral-400 uppercase"
      >History</span
    >
    <button
      @click="clearHistory()"
      class="inline-flex cursor-pointer items-center justify-center rounded-md px-2 py-1 text-[10px] text-neutral-400 transition-colors hover:text-neutral-900"
    >
      Clear
    </button>
  </div>
  {{if history.length > 0}}
  <ul class="mt-3 max-h-48 space-y-1.5 overflow-y-auto">
    {{forOf history as record}}
    <li
      class="rounded-lg bg-neutral-50 px-3 py-2 font-mono text-[10px] text-neutral-600"
    >
      {{=record}}
    </li>
    {{/forOf}}
  </ul>
  {{else}}
  <p class="mt-3 text-center text-[10px] text-neutral-300">No history</p>
  {{/if}}
</div>
