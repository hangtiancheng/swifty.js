<div
  class="relative flex min-h-screen flex-col items-center justify-center p-4 transition-colors duration-500 ease-in-out"
  data-theme="bumblebee"
>
  <button
    @click="onToggleLang()"
    class="btn btn-ghost btn-sm absolute top-4 right-4 text-orange-800/60 hover:bg-orange-800/10"
  >
    {{=switchLang}}
  </button>

  <div class="mx-auto w-full max-w-4xl animate-[fade-in_0.5s_ease-out]">
    <div
      class="mb-10 text-center transition-transform duration-300 hover:-translate-y-1"
    >
      <h1 class="mb-2 text-5xl font-extrabold text-orange-800 drop-shadow-sm">
        {{=appTitle}}
      </h1>
      <p class="font-medium text-orange-600/80">{{=appSubtitle}}</p>
    </div>
    <div v-lark="components/prompt-form"></div>
  </div>
</div>
