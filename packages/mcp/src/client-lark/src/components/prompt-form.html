<div
  class="card bg-base-100 w-full shadow-xl shadow-orange-900/5 transition-shadow duration-300 hover:shadow-2xl"
>
  <div class="card-body p-8 lg:p-12">
    <h2
      class="card-title text-base-content border-base-200 mb-8 border-b pb-4 text-3xl"
    >
      {{=formTitle}}
    </h2>

    <form @submit.prevent="onSubmit()" class="flex flex-col gap-6">
      <label class="form-control w-full">
        <div class="label">
          <span class="label-text text-base-content/80"
            >{{=promptNameLabel}}</span
          >
        </div>
        <input
          type="text"
          value="{{=name}}"
          @input="onNameInput()"
          class="input input-bordered bg-base-100 w-full transition-colors"
          placeholder="{{=promptNamePlaceholder}}"
          required
        />
      </label>

      <label class="form-control w-full">
        <div class="label">
          <span class="label-text text-base-content/80"
            >{{=descriptionLabel}}</span
          >
        </div>
        <input
          type="text"
          value="{{=description}}"
          @input="onDescriptionInput()"
          class="input input-bordered bg-base-100 w-full transition-colors"
          placeholder="{{=descriptionPlaceholder}}"
          required
        />
      </label>

      <label class="form-control w-full">
        <div class="label">
          <span class="label-text text-base-content/80">{{=contentLabel}}</span>
        </div>
        <textarea
          class="textarea textarea-bordered bg-base-100 h-40 w-full resize-y leading-relaxed transition-colors"
          placeholder="{{=contentPlaceholder}}"
          @input="onContentInput()"
          required
        >
{{=content}}</textarea
        >
      </label>

      <div class="card-actions mt-4 justify-end">
        <button
          type="submit"
          class="btn btn-primary px-10 transition-transform hover:scale-105 {{if isSaving}}btn-disabled{{/if}}"
        >
          {{if isSaving}}<span class="loading loading-spinner loading-sm"></span
          >{{/if}} {{if isSaving}}{{=savingLabel}}{{else}}{{=saveButton}}{{/if}}
        </button>
      </div>
    </form>

    {{if hasStatus}}
    <div
      class="alert mt-8 animate-[fade-in-up_0.3s_ease-out] {{if isError}}alert-error{{else}}alert-success{{/if}}"
    >
      <span>{{if isError}}FAIL{{else}}OK{{/if}}</span>
      <span class="font-medium">{{=status}}</span>
    </div>
    {{/if}}
  </div>
</div>
