name: Deploy Index to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - packages/lark-index/**
      - packages/lark-mvc/**
      - .github/workflows/deploy.yml

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build lark-mvc
        run: pnpm --filter @lark.js/mvc build
      - name: Build lark-index
        run: pnpm --filter lark-index build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./packages/lark-index/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
